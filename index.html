<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talkini - 英语课件推荐与水平测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F0F4FF;color:#1E293B;min-height:100dvh}
.page{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

.hero{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:60px 24px 48px;text-align:center;border-radius:0 0 40px 40px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%}
.hero::after{content:"";position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;background:rgba(255,255,255,.06);border-radius:50%}
.hero *{position:relative;z-index:1}
.logo{font-size:48px;margin-bottom:12px}
.hero h1{font-size:28px;font-weight:800;letter-spacing:1px;margin-bottom:8px}
.hero p{font-size:15px;opacity:.85;line-height:1.6}

.cards{padding:24px 20px;display:flex;flex-direction:column;gap:16px;flex:1}

.card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.06);display:flex;gap:20px;align-items:center;text-decoration:none;color:inherit;transition:all .2s;border:2px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.1)}
.card:active{transform:scale(.98)}

.card-icon{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.card-info{flex:1}
.card-info h2{font-size:18px;font-weight:700;margin-bottom:4px}
.card-info p{font-size:13px;color:#64748B;line-height:1.5}
.card-arrow{font-size:20px;color:#CBD5E1;flex-shrink:0;transition:transform .2s}
.card:hover .card-arrow{transform:translateX(4px);color:#94A3B8}

.card-test{border-color:#EEF2FF}
.card-test .card-icon{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.card-test:hover{border-color:#C7D2FE}

.card-course{border-color:#F0FDF4}
.card-course .card-icon{background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff}
.card-course:hover{border-color:#BBF7D0}

.footer{text-align:center;padding:20px;font-size:12px;color:#94A3B8}
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="logo">📚</div>
    <h1>Talkini</h1>
    <p>找到最适合孩子的英语课程<br>科学测评 · 精准推荐</p>
  </div>

  <div class="cards">
    <a class="card card-test" href="pages/level-test.html">
      <div class="card-icon">📝</div>
      <div class="card-info">
        <h2>英语水平测试</h2>
        <p>4 个趣味关卡，5 分钟快速定级<br>测完精准推荐适合的课程</p>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card card-course" href="pages/courseware.html">
      <div class="card-icon">📖</div>
      <div class="card-info">
        <h2>全部课件推荐</h2>
        <p>启蒙 · 进阶 · 拔高 · 成人<br>40+ 套课件详细介绍与选课指南</p>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <div class="footer">Talkini · 让英语学习更简单</div>
</div>
</body>
</html>
