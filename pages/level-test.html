<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语水平测试 - Talkini</title>
<link rel="icon" type="image/jpeg" href="../img/talkini_logo.jpg">
<meta name="description" content="5个趣味关卡，8分钟快速测评孩子的英语水平，精准推荐适合的学习课程">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#2563EB;--green:#22C55E;--yellow:#F59E0B;
  --red:#EF4444;--bg:#F0F4FF;--card:#fff;--text:#0F172A;
  --sub:#475569;--radius:20px;--shadow:0 4px 20px rgba(0,0,0,.08);
}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.container{max-width:640px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

/* screens (非welcome) */
.screen{display:none;flex-direction:column;align-items:center;padding:24px 20px;flex:1}
.screen.active{display:flex}

.welcome{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(135deg,#1E40AF 0%,#2563EB 60%,#3B82F6 100%);
  display:flex!important;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;color:#fff;
  overflow-y:auto;padding:40px 24px;
}
.welcome::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 50%,rgba(255,255,255,.1) 0%,transparent 50%)}
.welcome *{position:relative;z-index:1}
.welcome h1{font-size:clamp(32px,5vw,48px);margin-bottom:12px;letter-spacing:-1px;font-weight:900;}
.welcome .subtitle{font-size:16px;opacity:.95;margin-bottom:40px;line-height:1.6;font-weight:600;max-width:480px;}
.welcome .features{display:flex;gap:24px;margin-bottom:40px;font-size:14px;justify-content:center;flex-wrap:wrap;}
.welcome .features div{display:flex;flex-direction:column;align-items:center;gap:8px;}
.welcome .features .icon{font-size:36px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 48px;border-radius:50px;font-size:18px;font-weight:700;border:none;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;font-family:'Nunito',sans-serif;}
.btn-start{background:#fff;color:var(--primary);font-size:18px;box-shadow:0 6px 24px rgba(0,0,0,.2);}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.25);}
.btn-start:active{transform:scale(.96)}

/* Progress */
.progress-bar{position:sticky;top:0;z-index:10;background:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-bottom:1px solid #E2E8F0}
.progress-bar .stage-label{font-size:13px;color:var(--sub);white-space:nowrap;font-weight:600}
.progress-track{flex:1;height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease;background:var(--primary)}
.progress-bar .timer{font-size:15px;font-weight:700;min-width:40px;text-align:right;color:var(--primary)}

/* Quiz */
.quiz{padding-top:0}
.question-card{width:100%;background:var(--card);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;animation:slideUp .4s ease;border:1px solid #E2E8F0}
.q-number{font-size:13px;color:var(--sub);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.q-text{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:4px;color:var(--text)}
.q-emoji{font-size:56px;margin:16px 0}
.q-hint{font-size:13px;color:var(--sub);margin-top:4px}
.options{width:100%;display:flex;flex-direction:column;gap:12px}
.option{width:100%;padding:18px 20px;background:var(--card);border:2px solid #E2E8F0;border-radius:16px;font-size:17px;font-weight:500;text-align:left;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:12px;line-height:1.4;outline:none;-webkit-user-select:none;user-select:none}
.option:hover{border-color:var(--primary);background:#F8FAFC}
.option .opt-letter{width:32px;height:32px;border-radius:50%;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--sub);flex-shrink:0;transition:all .3s}
.option:active{transform:scale(.98)}
.option.correct{border-color:var(--green);background:#F0FDF4}
.option.correct .opt-letter{background:var(--green);color:#fff}
.option.wrong{border-color:var(--red);background:#FEF2F2}
.option.wrong .opt-letter{background:var(--red);color:#fff}
.option.disabled{pointer-events:none}

/* Stage Transition */
.stage-intro{justify-content:center;text-align:center}
.stage-intro .stage-icon{font-size:80px;margin-bottom:20px;animation:bounce 1s ease infinite}
.stage-intro h2{font-size:28px;margin-bottom:12px;font-weight:800;color:var(--text)}
.stage-intro p{color:var(--sub);font-size:16px;margin-bottom:40px;line-height:1.6}
.btn-next{background:var(--primary);color:#fff;padding:16px 48px;border-radius:50px;font-weight:700;font-size:18px}
.btn-next:active{transform:scale(.96);opacity:.9}

/* Result */
.result{text-align:center;padding-bottom:40px}
.result-header{width:100%;background:linear-gradient(135deg,#1E40AF 0%,#2563EB 60%,#3B82F6 100%);color:#fff;padding:48px 24px 40px;border-radius:0 0 32px 32px;margin-bottom:32px;position:relative;overflow:hidden}
.result-header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 30% 50%,rgba(255,255,255,.1) 0%,transparent 50%)}
.result-header *{position:relative;z-index:1}
.result-header .trophy{font-size:72px;margin-bottom:12px}
.result-header h2{font-size:20px;margin-bottom:8px;opacity:.95;font-weight:600}
.result-header .level-name{font-size:36px;font-weight:800;margin-bottom:12px;letter-spacing:-1px}
.result-header .level-desc{font-size:15px;opacity:.95;line-height:1.6;font-weight:500}
.result-stats{display:flex;justify-content:center;gap:32px;margin-top:20px}
.result-stats div{display:flex;flex-direction:column;align-items:center}
.result-stats .stat-num{font-size:28px;font-weight:800}
.result-stats .stat-label{font-size:13px;opacity:.9;font-weight:500}
.section-title{font-size:18px;font-weight:700;text-align:left;padding:0 20px;margin:32px 0 16px;display:flex;align-items:center;gap:8px;color:var(--text)}
.course-list{display:flex;flex-direction:column;gap:16px;padding:0 20px}
.course-card{display:flex;gap:16px;background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:left;border:1px solid #E2E8F0;transition:all .3s}
.course-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.12)}
.course-card img{width:80px;height:80px;border-radius:12px;object-fit:cover;background:#F1F5F9;flex-shrink:0}
.course-card .info{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px}
.course-card .info h4{font-size:16px;font-weight:700;line-height:1.3;color:var(--text)}
.course-card .info .tag{font-size:12px;color:var(--sub)}
.course-card .info .diff{font-size:12px;color:#F59E0B;font-weight:600}
.btn-retry{background:var(--primary);color:#fff;margin-top:24px;padding:14px 40px;border-radius:50px;font-weight:700;font-size:18px}
.btn-retry:active{transform:scale(.96)}
.recommend-label{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:4px}
.label-main{background:#EEF2FF;color:var(--primary)}
.label-extra{background:#F0FDF4;color:#16A34A}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.animate-pop{animation:pop .4s ease}
.animate-fade{animation:fadeIn .4s ease}
</style>
</head>

const app = document.getElementById("app");

function initState() {
  return {
    screen: "welcome",
    difficulty: 2,
    questionCount: 0,
    history: [],      // [{difficulty, correct}]
    usedIds: {},      // {level: Set<index>}
    currentQuestion: null,
    timer: 0,
    timerRef: null,
    totalCorrect: 0,
  };
}

let state = initState();

function getNextQuestion() {
  const level = state.difficulty;
  if (!state.usedIds[level]) state.usedIds[level] = new Set();
  const pool = QUESTION_BANK[level];
  const avail = pool.map((_, i) => i).filter(i => !state.usedIds[level].has(i));

  if (avail.length > 0) {
    const pick = avail[Math.floor(Math.random() * avail.length)];
    state.usedIds[level].add(pick);
    return { ...pool[pick], difficulty: level };
  }

  // 当前难度题目用尽，从相邻难度取题
  for (let d = 1; d <= 4; d++) {
    for (const tryLevel of [level + d, level - d]) {
      if (tryLevel < 1 || tryLevel > 5) continue;
      if (!state.usedIds[tryLevel]) state.usedIds[tryLevel] = new Set();
      const p = QUESTION_BANK[tryLevel];
      const a = p.map((_, i) => i).filter(i => !state.usedIds[tryLevel].has(i));
      if (a.length > 0) {
        const pick = a[Math.floor(Math.random() * a.length)];
        state.usedIds[tryLevel].add(pick);
        return { ...p[pick], difficulty: tryLevel };
      }
    }
  }
  return null;
}

function getFinalLevelIdx() {
  const h = state.history;
  if (h.length === 0) return 0;
  const recent = h.slice(-Math.min(8, h.length));
  const avg = recent.reduce((s, q) => s + q.difficulty, 0) / recent.length;
  if (avg < 1.5) return 0;
  if (avg < 2.5) return 1;
  if (avg < 3.5) return 2;
  if (avg < 4.5) return 3;
  return 4;
}

function render() {
  if (state.screen === "welcome") renderWelcome();
  else if (state.screen === "quiz") renderQuiz();
  else if (state.screen === "result") renderResult();
}

function renderWelcome() {
  app.innerHTML = `
    <div class="screen active welcome">
      <a href="../index.html" style="position:absolute;top:20px;left:20px;color:#fff;text-decoration:none;font-size:13px;font-weight:800;padding:7px 16px;border:2px solid rgba(255,255,255,0.5);border-radius:50px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);">← 首页</a>
      <div style="font-size:64px;margin-bottom:16px">📝</div>
      <h1>英语水平测试</h1>
      <p class="subtitle">15道自适应题目，精准测出英语水平<br>测完为你推荐最适合的课程</p>
      <div class="features">
        <div><span class="icon">⏱️</span><span>约3分钟</span></div>
        <div><span class="icon">🎯</span><span>自适应难度</span></div>
        <div><span class="icon">📚</span><span>精准推荐</span></div>
      </div>
      <div style="background:rgba(255,255,255,0.15);border-radius:14px;padding:12px 20px;margin-bottom:28px;font-size:13px;line-height:1.6;max-width:440px;backdrop-filter:blur(8px);">
        💡 <strong>小提示：</strong>如果孩子还不认字，家长可以读题给孩子听，孩子口头回答后帮忙点击选项
      </div>
      <button class="btn btn-start" onclick="startTest()">开始测试 🚀</button>
    </div>`;
}

function startTest() {
  state = initState();
  state.screen = "quiz";
  state.currentQuestion = getNextQuestion();
  render();
}

function startTimer() {
  clearInterval(state.timerRef);
  const timeLimit = TIME_BY_LEVEL[state.currentQuestion.difficulty];
  state.timer = timeLimit;
  updateTimerDisplay();
  state.timerRef = setInterval(() => {
    state.timer--;
    updateTimerDisplay();
    if (state.timer <= 0) {
      clearInterval(state.timerRef);
      handleAnswer(-1);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById("timer");
  if (el) {
    el.textContent = state.timer + "s";
    el.style.color = state.timer <= 5 ? "var(--red)" : "var(--sub)";
  }
}

function renderQuiz() {
  const q = state.currentQuestion;
  const progress = (state.questionCount / TOTAL_QUESTIONS) * 100;
  const letters = ["A","B","C","D"];
  const color = DIFF_COLORS[q.difficulty];
  const label = DIFF_LABELS[q.difficulty];

  app.innerHTML = `
    <div class="progress-bar">
      <span class="stage-label" style="color:${color}">${label}</span>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progress}%;background:${color}"></div>
      </div>
      <span class="timer" id="timer">${TIME_BY_LEVEL[q.difficulty]}s</span>
    </div>
    <div class="screen active quiz" style="padding-top:12px">
      <div class="question-card">
        <div class="q-number">第 ${state.questionCount + 1} / ${TOTAL_QUESTIONS} 题</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options" id="options">
        ${q.options.map((opt, i) => `
          <div class="option" role="button" data-idx="${i}" ontouchend="handleAnswer(${i})" onclick="handleAnswer(${i})">
            <span class="opt-letter">${letters[i]}</span>
            <span>${opt}</span>
          </div>
        `).join("")}
      </div>
    </div>`;
  startTimer();
  state.answered = false;
}

function handleAnswer(idx) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerRef);
  const q = state.currentQuestion;
  const correct = idx === q.answer;

  state.history.push({ difficulty: q.difficulty, correct });
  if (correct) state.totalCorrect++;
  state.questionCount++;

  // 自适应：答对升难，答错降难
  state.difficulty = correct
    ? Math.min(5, state.difficulty + 1)
    : Math.max(1, state.difficulty - 1);

  const opts = document.querySelectorAll(".option");
  opts.forEach(o => {
    o.classList.add("disabled");
    const oi = parseInt(o.dataset.idx);
    if (oi === q.answer) o.classList.add("correct");
    else if (oi === idx && !correct) o.classList.add("wrong");
  });

  setTimeout(() => {
    if (state.questionCount >= TOTAL_QUESTIONS) {
      state.screen = "result";
      render();
    } else {
      state.currentQuestion = getNextQuestion();
      if (!state.currentQuestion) {
        state.screen = "result";
        render();
      } else {
        renderQuiz();
      }
    }
  }, correct ? 600 : 900);
}

function renderResult() {
  const levelIdx = getFinalLevelIdx();
  const level = LEVELS[levelIdx];
  const accuracy = state.history.length > 0
    ? Math.round((state.totalCorrect / state.history.length) * 100) : 0;

  let mainCards = level.mainCourses.map(c => courseCard(c, "main", levelIdx)).join("");
  let extraCards = level.extraCourses.map(c => courseCard(c, "extra", levelIdx)).join("");

  const statsHTML = `
    <div><span class="stat-num">${state.totalCorrect}/${state.questionCount}</span><span class="stat-label">答对题数</span></div>
    <div><span class="stat-num">${accuracy}%</span><span class="stat-label">正确率</span></div>
  `;

  app.innerHTML = `
    <div class="screen active result animate-fade">
      <div class="result-header">
        <div class="trophy animate-pop">${level.icon}</div>
        <h2>测试完成！</h2>
        <div class="level-name">${level.name}</div>
        <div class="level-desc">${level.desc}</div>
        <div class="result-stats">${statsHTML}</div>
      </div>

      <div class="section-title">📚 推荐主课</div>
      <div class="course-list">${mainCards}</div>

      ${extraCards ? `
        <div class="section-title">📖 搭配阅读</div>
        <div class="course-list">${extraCards}</div>
      ` : ""}

      <div style="padding:0 20px;margin-top:32px">
        <button class="btn btn-retry" onclick="startTest()" style="width:100%">重新测试</button>
      </div>
    </div>`;
}

function courseCard(c, type, levelIdx) {
  const label = type === "main"
    ? '<span class="recommend-label label-main">推荐主课</span>'
    : '<span class="recommend-label label-extra">搭配阅读</span>';

  let section = 'section-1';
  if (levelIdx <= 1) section = 'section-1';
  else if (levelIdx <= 3) section = 'section-2';
  else section = 'section-3';

  return `
    <a href="courseware.html#${section}" class="course-card" style="text-decoration:none;color:inherit">
      <img src="${c.img}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="info">
        ${label}
        <h4>${c.name}</h4>
        <span class="diff">难度 ${c.diff}</span>
        <span class="tag">${c.tag}</span>
      </div>
    </a>`;
}

render();
</script>
