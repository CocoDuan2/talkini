<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#2563EB;--green:#22C55E;--yellow:#F59E0B;
  --red:#EF4444;--bg:#F8FAFC;--card:#fff;--text:#0F172A;
  --sub:#475569;--radius:20px;--shadow:0 4px 20px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.container{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

/* Welcome */
.screen{display:none;flex-direction:column;align-items:center;padding:24px 20px;flex:1}
.screen.active{display:flex}
.welcome{justify-content:center;text-align:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-radius:0;position:relative;overflow:hidden}
.welcome::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 50%,rgba(255,255,255,.1) 0%,transparent 50%)}
.welcome *{position:relative;z-index:1}
.welcome h1{font-size:36px;margin-bottom:12px;letter-spacing:-1px;font-weight:800}
.welcome .subtitle{font-size:16px;opacity:.95;margin-bottom:40px;line-height:1.6;font-weight:500}
.welcome .features{display:flex;gap:24px;margin-bottom:48px;font-size:14px;justify-content:center}
.welcome .features div{display:flex;flex-direction:column;align-items:center;gap:8px}
.welcome .features .icon{font-size:36px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 48px;border-radius:50px;font-size:18px;font-weight:700;border:none;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.btn-start{background:#fff;color:var(--primary);font-size:20px}
.btn-start:active{transform:scale(.96)}

/* Progress */
.progress-bar{position:sticky;top:0;z-index:10;background:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-bottom:1px solid #E2E8F0}
.progress-bar .stage-label{font-size:13px;color:var(--sub);white-space:nowrap;font-weight:600}
.progress-track{flex:1;height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease;background:var(--primary)}
.progress-bar .timer{font-size:15px;font-weight:700;min-width:40px;text-align:right;color:var(--primary)}

/* Quiz */
.quiz{padding-top:0}
.question-card{width:100%;background:var(--card);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;animation:slideUp .4s ease;border:1px solid #E2E8F0}
.q-number{font-size:13px;color:var(--sub);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.q-text{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:4px;color:var(--text)}
.q-emoji{font-size:56px;margin:16px 0}
.q-hint{font-size:13px;color:var(--sub);margin-top:4px}
.options{width:100%;display:flex;flex-direction:column;gap:12px}
.option{width:100%;padding:18px 20px;background:var(--card);border:2px solid #E2E8F0;border-radius:16px;font-size:17px;font-weight:500;text-align:left;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:12px;line-height:1.4}
.option:hover{border-color:var(--primary);background:#F8FAFC}
.option .opt-letter{width:32px;height:32px;border-radius:50%;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--sub);flex-shrink:0;transition:all .3s}
.option:active{transform:scale(.98)}
.option.correct{border-color:var(--green);background:#F0FDF4}
.option.correct .opt-letter{background:var(--green);color:#fff}
.option.wrong{border-color:var(--red);background:#FEF2F2}
.option.wrong .opt-letter{background:var(--red);color:#fff}
.option.disabled{pointer-events:none}

/* Vocab mode */
.vocab-word{font-size:40px;font-weight:800;color:var(--text);margin:24px 0 12px;letter-spacing:1px;animation:pop .3s ease}
.vocab-hint{font-size:14px;color:var(--sub);margin-bottom:28px}
.vocab-btns{display:flex;gap:16px;width:100%}
.vocab-btns button{flex:1;padding:20px;border-radius:16px;font-size:18px;font-weight:700;border:2px solid #E2E8F0;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent}
.vocab-btns .btn-know{background:#F0FDF4;border-color:var(--green);color:var(--green)}
.vocab-btns .btn-know:active{background:var(--green);color:#fff;transform:scale(.96)}
.vocab-btns .btn-dunno{background:#FEF2F2;border-color:var(--red);color:var(--red)}
.vocab-btns .btn-dunno:active{background:var(--red);color:#fff;transform:scale(.96)}
.vocab-progress{display:flex;gap:6px;margin-top:24px;justify-content:center;flex-wrap:wrap}
.vocab-dot{width:10px;height:10px;border-radius:50%;background:#E2E8F0;transition:all .3s}
.vocab-dot.know{background:var(--green)}
.vocab-dot.dunno{background:var(--red)}
.vocab-dot.current{background:var(--yellow);transform:scale(1.3)}

/* Stage Transition */
.stage-intro{justify-content:center;text-align:center}
.stage-intro .stage-icon{font-size:80px;margin-bottom:20px;animation:bounce 1s ease infinite}
.stage-intro h2{font-size:28px;margin-bottom:12px;font-weight:800;color:var(--text)}
.stage-intro p{color:var(--sub);font-size:16px;margin-bottom:40px;line-height:1.6}
.btn-next{background:var(--primary);color:#fff;padding:16px 48px;border-radius:50px;font-weight:700;font-size:18px}
.btn-next:active{transform:scale(.96);opacity:.9}

/* Stage fail / level determined */
.level-determined{justify-content:center;text-align:center;padding:40px 24px}
.level-determined .level-icon{font-size:80px;margin-bottom:16px}
.level-determined h2{font-size:24px;margin-bottom:8px}
.level-determined p{color:var(--sub);font-size:15px;line-height:1.6;margin-bottom:32px}

/* Result */
.result{text-align:center;padding-bottom:40px}
.result-header{width:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:48px 24px 40px;border-radius:0 0 32px 32px;margin-bottom:32px;position:relative;overflow:hidden}
.result-header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 30% 50%,rgba(255,255,255,.1) 0%,transparent 50%)}
.result-header *{position:relative;z-index:1}
.result-header .trophy{font-size:72px;margin-bottom:12px}
.result-header h2{font-size:20px;margin-bottom:8px;opacity:.95;font-weight:600}
.result-header .level-name{font-size:36px;font-weight:800;margin-bottom:12px;letter-spacing:-1px}
.result-header .level-desc{font-size:15px;opacity:.95;line-height:1.6;font-weight:500}
.result-stats{display:flex;justify-content:center;gap:32px;margin-top:20px}
.result-stats div{display:flex;flex-direction:column;align-items:center}
.result-stats .stat-num{font-size:28px;font-weight:800}
.result-stats .stat-label{font-size:13px;opacity:.9;font-weight:500}
.section-title{font-size:18px;font-weight:700;text-align:left;padding:0 20px;margin:32px 0 16px;display:flex;align-items:center;gap:8px;color:var(--text)}
.course-list{display:flex;flex-direction:column;gap:16px;padding:0 20px}
.course-card{display:flex;gap:16px;background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:left;border:1px solid #E2E8F0;transition:all .3s}
.course-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.12)}
.course-card img{width:80px;height:80px;border-radius:12px;object-fit:cover;background:#F1F5F9;flex-shrink:0}
.course-card .info{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px}
.course-card .info h4{font-size:16px;font-weight:700;line-height:1.3;color:var(--text)}
.course-card .info .tag{font-size:13px;color:var(--sub)}
.course-card .info .diff{font-size:13px;color:#F59E0B;font-weight:600}
.btn-retry{background:var(--primary);color:#fff;margin-top:32px;padding:16px 48px;border-radius:50px;font-weight:700;font-size:18px}
.btn-retry:active{transform:scale(.96)}
.recommend-label{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:6px}
.label-main{background:#EEF2FF;color:var(--primary)}
.label-extra{background:#F0FDF4;color:#16A34A}
.course-card .info .tag{font-size:12px;color:var(--sub)}
.course-card .info .diff{font-size:12px;color:var(--pink)}
.btn-retry{background:var(--primary);color:#fff;margin-top:24px;padding:14px 40px}
.btn-retry:active{transform:scale(.96)}
.recommend-label{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:4px}
.label-main{background:#EEF2FF;color:var(--primary)}
.label-extra{background:#F0FDF4;color:#16A34A}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.animate-pop{animation:pop .4s ease}
.animate-fade{animation:fadeIn .4s ease}
</style>
</head>

];

const app = document.getElementById("app");
let state = { screen: "welcome", stage: 0, qIndex: 0, scores: [0,0,0,0], timer: 0, timerRef: null, totalCorrect: 0, totalAnswered: 0, vocabKnown: 0, vocabFake: 0, vocabResults: [] };

function render() {
  if (state.screen === "welcome") renderWelcome();
  else if (state.screen === "stage-intro") renderStageIntro();
  else if (state.screen === "quiz") renderQuiz();
  else if (state.screen === "vocab") renderVocab();
  else if (state.screen === "result") renderResult();
}

function renderWelcome() {
  app.innerHTML = `
    <div class="screen active welcome">
      <a href="../index.html" style="position:absolute;top:16px;left:16px;color:rgba(255,255,255,.8);text-decoration:none;font-size:14px;font-weight:600">← 首页</a>
      <div style="font-size:64px;margin-bottom:16px">📝</div>
      <h1>英语水平测试</h1>
      <p class="subtitle">4 个趣味关卡，快速了解英语水平<br>测完为你推荐最适合的课程</p>
      <div class="features">
        <div><span class="icon">⏱️</span><span>5-8 分钟</span></div>
        <div><span class="icon">🎯</span><span>自适应难度</span></div>
        <div><span class="icon">📚</span><span>精准推荐</span></div>
      </div>
      <button class="btn btn-start" onclick="startTest()">开始测试</button>
    </div>`;
}

function startTest() {
  state = { screen: "stage-intro", stage: 0, qIndex: 0, scores: [0,0,0,0], timer: 0, timerRef: null, totalCorrect: 0, totalAnswered: 0, vocabKnown: 0, vocabFake: 0, vocabResults: [] };
  render();
}

function renderStageIntro() {
  const s = STAGES[state.stage];
  const count = s.mode === "vocab" ? s.words.length + " 个单词" : s.questions.length + " 题";
  const timeDesc = s.mode === "vocab" ? `每词 ${s.timeLimit} 秒` : `每题 ${s.timeLimit} 秒`;
  app.innerHTML = `
    <div class="screen active stage-intro animate-fade">
      <div class="stage-icon">${s.icon}</div>
      <h2>${s.name}：${s.title}</h2>
      <p>${s.desc}<br><br>共 ${count}，${timeDesc}</p>
      <button class="btn btn-next" onclick="startStage()">准备好了！</button>
    </div>`;
}

function startStage() {
  const s = STAGES[state.stage];
  state.qIndex = 0;
  if (s.mode === "vocab") {
    state.screen = "vocab";
    state.vocabKnown = 0;
    state.vocabFake = 0;
    state.vocabResults = [];
  } else {
    state.screen = "quiz";
  }
  render();
}

function startTimer() {
  clearInterval(state.timerRef);
  const s = STAGES[state.stage];
  state.timer = s.timeLimit;
  updateTimerDisplay();
  state.timerRef = setInterval(() => {
    state.timer--;
    updateTimerDisplay();
    if (state.timer <= 0) {
      clearInterval(state.timerRef);
      if (state.screen === "vocab") handleVocab(false);
      else handleAnswer(-1);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById("timer");
  if (el) {
    el.textContent = state.timer + "s";
    el.style.color = state.timer <= 5 ? "var(--red)" : "var(--sub)";
  }
}

function renderQuiz() {
  const s = STAGES[state.stage];
  const q = s.questions[state.qIndex];
  const totalQ = s.questions.length;
  const progress = ((state.qIndex) / totalQ) * 100;
  const letters = ["A","B","C","D"];

  let displayHTML = "";
  if (q.displayStyle === "letter") {
    displayHTML = `<div class="q-emoji" style="font-family:serif;font-weight:900;font-size:72px;color:${s.color}">${q.display}</div>`;
  }

  app.innerHTML = `
    <div class="progress-bar">
      <span class="stage-label" style="color:${s.color}">${s.name}</span>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progress}%;background:${s.color}"></div>
      </div>
      <span class="timer" id="timer">${s.timeLimit}s</span>
    </div>
    <div class="screen active quiz" style="padding-top:12px">
      <div class="question-card">
        <div class="q-number">第 ${state.qIndex + 1} / ${totalQ} 题</div>
        ${displayHTML}
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options" id="options">
        ${q.options.map((opt, i) => `
          <button class="option" data-idx="${i}" onclick="handleAnswer(${i})">
            <span class="opt-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join("")}
      </div>
    </div>`;
  startTimer();
}

function renderVocab() {
  const s = STAGES[state.stage];
  const w = s.words[state.qIndex];
  const total = s.words.length;
  const progress = (state.qIndex / total) * 100;

  let dots = "";
  for (let i = 0; i < total; i++) {
    let cls = "vocab-dot";
    if (i < state.vocabResults.length) cls += state.vocabResults[i] ? " know" : " dunno";
    else if (i === state.qIndex) cls += " current";
    dots += `<span class="${cls}"></span>`;
  }

  app.innerHTML = `
    <div class="progress-bar">
      <span class="stage-label" style="color:${s.color}">${s.name}</span>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progress}%;background:${s.color}"></div>
      </div>
      <span class="timer" id="timer">${s.timeLimit}s</span>
    </div>
    <div class="screen active quiz" style="padding-top:12px">
      <div class="question-card" style="text-align:center">
        <div class="q-number">第 ${state.qIndex + 1} / ${total} 个单词</div>
        <div class="q-hint">你认识这个单词吗？</div>
        <div class="vocab-word">${w.word}</div>
        <div class="vocab-progress">${dots}</div>
      </div>
      <div class="vocab-btns">
        <button class="btn-dunno" onclick="handleVocab(false)">✗ 不认识</button>
        <button class="btn-know" onclick="handleVocab(true)">✓ 认识</button>
      </div>
    </div>`;
  startTimer();
}

function handleVocab(know) {
  clearInterval(state.timerRef);
  const s = STAGES[state.stage];
  const w = s.words[state.qIndex];

  state.vocabResults.push(know);

  if (know && w.real) {
    state.vocabKnown++;
  } else if (know && !w.real) {
    state.vocabFake++;
  }

  state.totalAnswered++;
  state.qIndex++;

  if (state.qIndex >= s.words.length) {
    let score = Math.max(0, state.vocabKnown - state.vocabFake * 3);
    state.scores[state.stage] = score;
    state.totalCorrect += score;
    finishStage();
  } else {
    render();
  }
}

function handleAnswer(idx) {
  clearInterval(state.timerRef);
  const s = STAGES[state.stage];
  const q = s.questions[state.qIndex];
  const correct = idx === q.answer;
  state.totalAnswered++;

  if (correct) {
    state.scores[state.stage]++;
    state.totalCorrect++;
  }

  const opts = document.querySelectorAll(".option");
  opts.forEach(o => {
    o.classList.add("disabled");
    const oi = parseInt(o.dataset.idx);
    if (oi === q.answer) o.classList.add("correct");
    else if (oi === idx && !correct) o.classList.add("wrong");
  });

  setTimeout(() => {
    state.qIndex++;
    if (state.qIndex >= s.questions.length) {
      finishStage();
    } else {
      render();
    }
  }, correct ? 600 : 900);
}

function finishStage() {
  const s = STAGES[state.stage];
  const score = state.scores[state.stage];
  const passed = score >= s.passScore;

  if (passed && state.stage < STAGES.length - 1) {
    state.stage++;
    state.screen = "stage-intro";
    render();
  } else {
    state.screen = "result";
    render();
  }
}

function getLevel() {
  for (let i = 0; i < STAGES.length; i++) {
    if (state.scores[i] < STAGES[i].passScore) return i;
  }
  return STAGES.length;
}

function renderResult() {
  const levelIdx = getLevel();
  const level = LEVELS[Math.min(levelIdx, LEVELS.length - 1)];
  const stagesCompleted = Math.min(levelIdx + 1, STAGES.length);

  let mainCards = level.mainCourses.map(c => courseCard(c, "main")).join("");
  let extraCards = level.extraCourses.map(c => courseCard(c, "extra")).join("");

  let statsHTML = "";
  for (let i = 0; i < stagesCompleted && i < STAGES.length; i++) {
    const s = STAGES[i];
    const passed = state.scores[i] >= s.passScore;
    const total = s.mode === "vocab" ? s.words.filter(w => w.real).length : s.questions.length;
    const label = s.mode === "vocab" ? "词汇认知" : s.title;
    statsHTML += `<div><span class="stat-num">${state.scores[i]}/${total}</span><span class="stat-label">${label} ${passed ? "✅" : ""}</span></div>`;
  }

  app.innerHTML = `
    <div class="screen active result animate-fade">
      <div class="result-header">
        <div class="trophy animate-pop">${level.icon}</div>
        <h2>测试完成！</h2>
        <div class="level-name">${level.name}</div>
        <div class="level-desc">${level.desc}</div>
        <div class="result-stats">${statsHTML}</div>
      </div>

      <div class="section-title">📚 推荐主课</div>
      <div class="course-list">${mainCards}</div>

      ${extraCards ? `
        <div class="section-title">📖 搭配阅读</div>
        <div class="course-list">${extraCards}</div>
      ` : ""}

      <div style="padding:0 20px;margin-top:32px">
        <button class="btn btn-retry" onclick="startTest()" style="width:100%">重新测试</button>
      </div>
    </div>`;
}

function courseCard(c, type) {
  const label = type === "main"
    ? '<span class="recommend-label label-main">推荐主课</span>'
    : '<span class="recommend-label label-extra">搭配阅读</span>';

  // 根据level确定跳转的章节
  const levelIdx = getLevel();
  let section = 'section-1'; // 默认启蒙阶段
  if (levelIdx === 0) section = 'section-1'; // 零基础 → 启蒙
  else if (levelIdx === 1) section = 'section-1'; // 字母基础 → 启蒙
  else if (levelIdx === 2) section = 'section-2'; // 简单对话 → 进阶
  else if (levelIdx === 3) section = 'section-2'; // 流利对话 → 进阶
  else section = 'section-3'; // 高级对话 → 拔高

  return `
    <a href="courseware.html#${section}" class="course-card" style="text-decoration:none;color:inherit">
      <img src="${c.img}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="info">
        ${label}
        <h4>${c.name}</h4>
        <span class="diff">难度 ${c.diff}</span>
        <span class="tag">${c.tag}</span>
      </div>
    </a>`;
}

render();
</script>
</body>
</html>
