const md = `# 英语教材怎么选？课件推荐指南

> 💡 选教材看**孩子的英语水平**，不看年龄。同龄孩子基础可能差很多，选对难度比选对年龄更重要。

**难度参考：** ❤ 入门 → ❤❤ 基础 → ❤❤❤ 中级 → ❤❤❤❤ 中高级 → ❤❤❤❤❤ 高级

<div id="section-table"></div>

## 选课建议速查表

> 根据孩子当前英语水平选择，而非年龄（针对外教口语课程）

| 当前水平 | 主课推荐 | 搭配阅读 |
|---------|---------|---------|
| **零基础**（不认识字母） | 51Talk LK-L0（启蒙预备级）、Welcome to Our World（国家地理少儿英语前传）、Show and Tell（牛津少儿英语）、Jolly Finger Phonics（快乐手指自然拼读） | Maisy（小鼠波波）、Pip and Posy（波西和皮普）、Biscuit（小饼干狗）、Peppa Pig 绘本（小猪佩奇） |
| **字母基础**（认识字母、简单单词） | Oxford Phonics World（牛津自然拼读）、Longman Phonics Fun（香港朗文自然拼读）、51Talk L0-L1（字母基础）、Everybody Up Starter-1、Kid's Box Starter（剑桥少儿英语）、Sight Words（启蒙高频词）、Let's Go 五版（牛津经典少儿英语） | Heinemann G0-G1、牛津阅读树 Stage 3-4、RAZ AA-C、PM Starter |
| **简单对话**（能说简单句子、日常对话） | 51Talk L2-L3、Everybody Up 2-3、Power UP 0-2、Kid's Box 1-3、Hip Hip Hooray（朗文3H少儿英语）、New Magic K3-G1（香港朗文魔法英语）、Reach鲸鱼 GK-G1、Wonder Skills Starter-Basic | Heinemann G2、牛津阅读树 Stage 5-6、RAZ D-G、PM Basic、1000词（1000 Essential English Words） |
| **流利对话**（能较流利交流、简单阅读） | 51Talk L4-L6、Everybody Up 4-6、Power UP 3-4、Kid's Box 4-6、Oxford Discover Foundation（牛津探索发现预备级）、Our World 2ed（国家地理）、Welcome to English（新思维小学英语）、Wonder Skills Intermediate-Master | 牛津阅读树 Stage 7-9、RAZ H-K、PM Intermediate、2000词（2000 Essential English Words） |
| **高级对话**（流利表达、能读短文） | 51Talk L7-L9、Power UP 5-6、Oxford Discover Series（牛津探索系列）、Think 2nd、Reading Explorer（国家地理）、Wonders 加州语文、Complete KET/PET | RAZ L-P、牛津阅读树 Stage 10-12、新概念英语、PM Advanced、4000词（4000 Essential English Words） |

## 一、启蒙阶段

> 适合刚刚启蒙或零基础的孩子

### 🔤 牛津自然拼读 Oxford Phonics World

<img src="https://pica.zhimg.com/100/v2-8196e69cce8bae9d1b9febf342de3e00_r.jpg" width="160">

**难度：❤**｜出版社：牛津大学出版社｜参考年龄：3-12岁

1. 牛津大学出版社经典教材，系统专业又层层递进，堪称最好的自然拼读教材
2. 靠"字母/字母组合发音规律"实现"见词能拼、听音能写"
3. 内容丰富，包含单词听读、书写、辨音、故事、歌曲、游戏
4. 分级清晰：入门→基础→进阶→应用，衔接拼读与阅读

> 📌 平台提供简洁版和多动画版两种课件可选

---

### 🐣 51Talk经典英语青少年系列

<img src="https://pic2.zhimg.com/100/v2-e845c002c6f251657310ae1f17360e9b_r.jpg" width="160">

**难度：❤❤**｜参考年龄：3-16岁｜共10个级别（LK-L9）

1. 适合启蒙，每节课一个主题，涉及范围广
2. 内容循序渐进，画面活泼，能吸引小朋友注意力，非常适合中国宝宝体质
3. 科学分级体系：
   - **LK（启蒙预备级）**：听懂课堂指令，会说基础单词
   - **L0（零基础入门）**：26个字母认知，144个核心词汇
   - **L1-L3（初级）**：入门到简单应用，累计864个高频词汇
   - **L4-L6（中级）**：熟练应用与读写拓展，1296个词汇
   - **L7-L9（高级）**：学术冲刺，864个学术词汇+18个核心语法点

---

### 🐋 Reach鲸鱼教材

<img src="https://pic1.zhimg.com/100/v2-a8918cf0e621304ca3ec9f78180dc374_r.jpg" width="160">

**难度：❤❤❤**｜出版社：国家地理学习｜共9个级别（PreK-G3）

1. 课件十分有趣，结合真实世界主题，会提高孩子的兴趣
2. 相对于前面2个教材，Reach鲸鱼难度稍微大一些，需要孩子上过一段课后再进行
3. PreK级别适合零基础孩子，通过故事、歌曲和游戏自然习得英语

---

### 📚 Pip and Posy 波西和皮普

<img src="https://pic3.zhimg.com/100/v2-d75253d2888206ee636e6444ff0f88e8_r.jpg" width="160">

**难度：❤**｜参考年龄：2-6岁

1. 英国经典低幼绘本，围绕两个好朋友的日常小故事展开
2. 语言简单重复、画风温暖，适合零基础磨耳朵和亲子共读
3. 适合作为孩子第一批英文绘本，建立英语和日常生活场景的连接

---

### 🐭 Maisy 小鼠波波

<img src="https://pic2.zhimg.com/100/v2-6841fe46ec4a952a42b8eecb763857cb_r.jpg" width="160">

**难度：❤**｜参考年龄：0-6岁

1. Lucy Cousins 创作的低幼启蒙绘本，色彩鲜明、句式极简
2. 主题贴近吃饭、睡觉、玩耍、上学等幼儿生活场景
3. 适合亲子共读，也可以配合动画做低龄磨耳朵

---

### 🐶 Biscuit 小饼干狗

<img src="https://pica.zhimg.com/100/v2-131b8068d37d3a8737b8a1d4457ac69c_r.jpg" width="160">

**难度：❤**｜参考年龄：2-6岁

1. I Can Read 入门级经典绘本，讲述小黄狗 Biscuit 和小主人的日常
2. 高频词和重复句型密集，句子短、韵律感强，零基础友好
3. 适合从亲子绘本过渡到最初级自主阅读

---

### 🐘 Elephant & Piggie 小猪小象

<img src="https://pic3.zhimg.com/80/v2-af1e51cb60693fcf898ac0e5ba3f1d12_1440w.webp" width="160">

**难度：❤❤**｜参考年龄：3-8岁

1. Mo Willems 创作的对话体绘本，主角是小象 Gerald 和小猪 Piggie
2. 语言幽默、表情夸张，特别适合练习口语语感和情绪表达
3. 比 Maisy、Biscuit 稍难，适合孩子已经能听懂或模仿简单句之后使用

---

### 🐷 Peppa Pig 小猪佩奇绘本阅读英语

<img src="https://pic3.zhimg.com/80/v2-2b07b34372e99a712bb8389f1b9a429a_1440w.webp" width="160">

**难度：❤❤**｜参考年龄：2-8岁

1. 改编自小猪佩奇动画的低龄绘本资源，主题围绕家庭、玩具、旅行和朋友互动
2. 句子短、重复度高、生活场景清楚，适合亲子共读和低龄磨耳朵
3. 与动画版不是同一种课件形态，绘本更适合做指读、复述和基础阅读启蒙

---

### 🔤 Sight Words 启蒙高频词

<img src="https://picx.zhimg.com/100/v2-be7f4ea9c408e80e307940e688c0a3c1_r.jpg" width="160">

**难度：❤❤**｜参考年龄：幼儿园-一年级

1. 专为儿童英语启蒙设计的高频词学习资源，共5个级别（L1-L5）
2. 科学编排：按词汇出现频率和难度递进，从40个基础词汇到128个进阶词汇
3. 内容包含单词听读、书写、辨音、故事、歌曲、游戏

---

### 🌍 Welcome to Our World

<img src="https://pic1.zhimg.com/80/v2-d70038503a6206b1cda3e1ca4b352bae_1440w.webp" width="160">

**难度：❤**｜出版社：国家地理学习｜参考年龄：3-6岁

1. 国家地理少儿英语体系里的启蒙前传，适合幼儿园阶段或刚接触英语的孩子
2. 主题围绕家庭、动物、颜色、数字等低幼生活场景，图片真实、输入自然
3. 适合作为 \`Our World 2ed\` 之前的启蒙铺垫，先建立兴趣、语感和基础表达

---

### 🗣️ Show and Tell 牛津少儿英语

<img src="https://picx.zhimg.com/70/v2-b1bddb564b1c47c8e2279145ac624fbf_1440w.avis?source=172ae18b&biz_tag=Post" width="160">

**难度：❤**｜出版社：牛津大学出版社｜参考年龄：3-6岁

1. 牛津零基础启蒙教材，图大字少、场景清楚，适合第一套系统口语课
2. 重点训练课堂互动、简单表达和基础主题词汇，让孩子先敢听、敢说
3. 可搭配牛津阅读树 Stage 1-2，逐步从听说启蒙过渡到亲子阅读

---

### ✋ Jolly Finger Phonics 快乐手指自然拼读

<img src="https://pic2.zhimg.com/80/v2-ea643f04d431f79b60d9933df0510f69_1440w.webp" width="160">

**难度：❤**｜参考年龄：3-7岁

1. 用手指动作、儿歌和书写动作学习字母音，适合低龄孩子玩着进入自然拼读
2. 比纯纸面练习更适合刚启蒙的孩子，能把声音、动作和字母形状绑定起来
3. 适合搭配 \`Oxford Phonics World\` 或绘本阅读，作为拼读入门前的热身课

---

### 🔤 Longman Phonics Fun 香港朗文自然拼读

<img src="https://pic2.zhimg.com/100/v2-d2c1cda2395aa9e88694d420490d2ea7_r.jpg" width="160">

**难度：❤❤**｜出版社：Pearson Longman｜参考年龄：4-10岁

1. 香港朗文经典拼读教材，贴合亚洲孩子学习节奏，音形对应清晰
2. 从26个字母音、短元音、辅音组合逐步推进到长元音和复杂拼读
3. 适合已经认识部分字母、准备从听说启蒙进入自主拼读的孩子

---

### 👾 Phonics Monster 怪兽自然拼读

<img src="https://pic4.zhimg.com/80/v2-4132f859b351c76414193d8fdb924d59_1440w.webp" width="160">

**难度：❤❤**｜参考年龄：4-10岁

1. 趣味化自然拼读教材，用怪兽主题降低拼读练习的枯燥感
2. 适合强化字母音、拼读规则和基础单词识读
3. 更适合作为 \`Oxford Phonics World\` 或 \`Longman Phonics Fun\` 的补充练习

## 二、进阶阶段

> 适合有一定英语基础，需要系统提升的孩子

### 📦 Kid's Box 剑桥国际少儿英语

<img src="https://pic3.zhimg.com/100/v2-61c7e4be2b6c8d54b88bcf4a8171ed16_r.jpg" width="160">
